<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <header>

    </header>

<div>
    <table th:if="${!#lists.isEmpty(alunos)}" class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Matrícula</th>
            <th>Curso</th>
        </tr>
        </thead>
        <tbody>
        <!--
            th:each itera sobre a lista "alunos" (recebida do Controller).
            Para cada item, cria uma variável "aluno" acessível dentro do <tr>.
        -->
        <tr th:each="aluno : ${alunos}">
            <!-- th:text substitui o conteúdo do elemento pelo valor do atributo -->
            <td th:text="${aluno.id}">1</td>
            <td th:text="${aluno.nome}">Nome</td>
            <td th:text="${aluno.matricula}">000000</td>
            <td th:text="${aluno.curso}">Curso</td>
            <td>
                <!--
                    th:href="@{...}" gera URLs dinâmicas.
                    O valor entre parênteses substitui a variável na URL.
                -->
                <a th:href="@{/alunos/editar/{id}(id=${aluno.id})}"
                   class="btn btn-sm btn-warning">Editar</a>

                <a th:href="@{/alunos/excluir/{id}(id=${aluno.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Tem certeza que deseja excluir este aluno?')">
                    Excluir
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>


</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
